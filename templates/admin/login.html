<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-camera"></i>
      </div>
      <h1 class="login-title">Administration</h1>
      <p class="login-sub">Accès réservé au photographe</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="admin-flash admin-flash--{{ cat }}" style="margin-bottom:1rem">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}" class="login-form">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Identifiant</label>
          <input type="text" id="username" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn--admin-primary btn--full">
          <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
      </form>

      <a href="{{ url_for('index') }}" class="back-to-site"><i class="fas fa-arrow-left"></i> Retour au site</a>
    </div>
  </div>
  <script>
    function togglePw(){
      const inp = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if(inp.type==='password'){ inp.type='text'; icon.className='fas fa-eye-slash'; }
      else { inp.type='password'; icon.className='fas fa-eye'; }
    }
  </script>
</body>
</html>
